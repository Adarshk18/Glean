services:

  # -------------------------------------------------------------
  # PostgreSQL - our relational database (users, documents, chat history)
  # -------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: docchat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docchat
      POSTGRES_PASSWORD: docchat_password
      POSTGRES_DB: docchat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docchat -d docchat_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------
  # Qdrant - our vector database (stores document chunk embeddings)
  # -------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docchat_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API (what our Python client uses)
      - "6334:6334"   # gRPC API (faster, optional, used internally by some clients)
    volumes:
      - qdrant_data:/qdrant/storage

# -------------------------------------------------------------
# Named volumes: Docker manages these directories so your data
# survives container restarts. Without this, every "docker compose
# down" would wipe your database completely.
# -------------------------------------------------------------
volumes:
  postgres_data:
  qdrant_data: